name: Frontend CI

on:
  push:
    branches: [main]
    paths: ['admin-frontend/**']
  pull_request:
    branches: [main]

jobs:
  admin-frontend-ci:
    name: Type check, lint & build for admin-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
