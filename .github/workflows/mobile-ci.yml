name: Mobile CI

on:
  push:
    branches: [main]
    paths: ['worker-mobile-app/**']
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Mobile Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker-mobile-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker-mobile-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

  expo-doctor:
    name: Mobile Expo Doctor
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker-mobile-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker-mobile-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Expo Doctor
        run: npx expo-doctor
